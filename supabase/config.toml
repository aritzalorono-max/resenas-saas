# Supabase local development configuration
# Run `supabase start` to use these settings locally.
# For production (hosted Supabase), configure email templates and SMTP
# directly in the Supabase dashboard:
#   Authentication → Email Templates
#   Project Settings → Authentication → SMTP Settings

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Allow unconfirmed signups for local dev
email_confirm_changes = true
double_confirm_changes = true
enable_signup = true
# Absolute URL for redirects
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
# Custom email templates (loaded for local dev with `supabase start`)
[auth.email.template.confirmation]
subject = "Activa tu cuenta de ReseñasYa ✉️"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Recupera el acceso a ReseñasYa 🔑"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Tu enlace de acceso a ReseñasYa"
content_path = "./supabase/templates/magic-link.html"

[auth.email.template.email_change]
subject = "Confirma tu nuevo email en ReseñasYa"
content_path = "./supabase/templates/email-change.html"

[auth.email.template.invite]
subject = "Te invitamos a unirte a ReseñasYa"
content_path = "./supabase/templates/invite.html"

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = true
# Set these in .env.local for local Google OAuth:
# client_id = ""
# secret = ""
redirect_uri = "http://localhost:54321/auth/v1/callback"
